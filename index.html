    async function verifyPermission(directoryHandle, requestPermission) {
      const options = { mode: "readwrite" };
      if (await directoryHandle.queryPermission(options) === "granted") {
        return true;
      }
      if (requestPermission && await directoryHandle.requestPermission(options) === "granted") {
        return true;
      }
      return false;
    }

    async function readPreferencesFromFile(fileHandle) {
      const empty = { favorites: [], booked: [], hidden: [] };
      const file = await fileHandle.getFile();
      if (file.size === 0) {
        return empty;
      }
      const text = await file.text();
      if (!text.trim()) {
        return empty;
      }
      const parsed = JSON.parse(text);
      const toIdList = (value) => Array.isArray(value) ? value.map(Number).filter(Number.isFinite) : [];
      return {
        favorites: toIdList(parsed.favorites),
        booked: toIdList(parsed.booked),
        hidden: toIdList(parsed.hidden)
      };
    }

    function schedulePreferenceSave() {
      if (!state.fileHandle) {
        state.saveMessage = "Choose folder to save favorites";
        updatePreferenceUi();
        return;
      }
      state.saveMessage = "Saving favorites";
      updatePreferenceUi();
      window.clearTimeout(state.saveTimer);
      state.saveTimer = window.setTimeout(() => {
        savePreferencesNow().catch((error) => {
          state.saveMessage = "Save failed: " + error.message;
          updatePreferenceUi();
        });
      }, 180);
    }

    async function savePreferencesNow() {
      if (!state.fileHandle) {
        return;
      }
      const payload = {
        version: 1,
        eventId: state.event.id,
        eventName: state.event.name,
        updatedAt: new Date().toISOString(),
        favorites: [...state.favorites].sort((a, b) => a - b),
        booked: [...state.booked].sort((a, b) => a - b),
        hidden: [...state.hidden].sort((a, b) => a - b)
      };
      const writable = await state.fileHandle.createWritable();
      await writable.write(JSON.stringify(payload, null, 2) + "\n");
      await writable.close();
      state.dirtyFavorites = false;
      state.saveMessage = "Saved to " + PREFS_FILE_NAME;
      updatePreferenceUi();
    }

    async function restoreStoredDirectory() {
      if (!("showDirectoryPicker" in window) || !("indexedDB" in window)) {
        state.saveMessage = "Folder picker unavailable in this browser";
        return;
      }
      try {
        const directoryHandle = await readStoredDirectoryHandle();
        if (!directoryHandle) {
          return;
        }
        state.directoryHandle = directoryHandle;
        const connected = await connectDirectory(directoryHandle, false);
        if (!connected) {
          state.saveMessage = "Reconnect folder to load favorites";
        }
      } catch (error) {
        state.saveMessage = "Stored folder unavailable";
      }
    }

    function updatePreferenceUi() {
      dom.preferenceStatus.textContent = state.saveMessage;
      if (!("showDirectoryPicker" in window)) {
        dom.folderButton.textContent = "Folder unavailable";
        dom.folderButton.disabled = true;
      } else if (state.fileHandle) {
        dom.folderButton.textContent = "Change folder";
        dom.folderButton.disabled = false;
      } else if (state.directoryHandle) {
        dom.folderButton.textContent = "Reconnect folder";
        dom.folderButton.disabled = false;
      } else {
        dom.folderButton.textContent = "Choose folder";
        dom.folderButton.disabled = false;
      }
    }

    function openHandleDatabase() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open("wad2026-file-handles", 1);
        request.onupgradeneeded = () => {
          request.result.createObjectStore("handles");
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function storeDirectoryHandle(directoryHandle) {
      if (!("indexedDB" in window)) {
        return;
      }
      const db = await openHandleDatabase();
      await transactionPromise(db, "readwrite", (store) => store.put(directoryHandle, "preferencesDirectory"));
      db.close();
    }

    async function readStoredDirectoryHandle() {
      const db = await openHandleDatabase();
      const result = await transactionPromise(db, "readonly", (store) => store.get("preferencesDirectory"));
      db.close();
      return result;
    }

    function transactionPromise(db, mode, operation) {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction("handles", mode);
        const store = transaction.objectStore("handles");
        const request = operation(store);
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
        transaction.onerror = () => reject(transaction.error);
      });
    }
  </script>
</body>
</html>
